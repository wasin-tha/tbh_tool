name: Update Steam Prices

on:
  # schedule ใช้ cron-job.org ยิง workflow_dispatch แทน (ตรงเวลากว่า GitHub cron)
  # เพิ่ม GitHub schedule กลับได้: ใส่ schedule: - cron: '37 * * * *'
  workflow_dispatch:          # cron-job.org + กดรันเองจากแท็บ Actions

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Fetch Steam Market prices
        env:
          STEAM_COOKIE: ${{ secrets.STEAM_COOKIE }}
        run: |
          cd tbh_march
          python fetch_prices.py

      - name: Rebuild index.html + prices.json
        run: |
          cd tbh_march
          python gen_tbh.py
          cp index.html ../index.html
          cp prices.json ../prices.json

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html prices.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "Update Steam Market prices (auto)"
            # rebase บน remote ก่อน push (กัน "fetch first" ตอน remote ขยับ)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push retry $i..."; sleep 4
            done
          fi

      - name: Notify Discord on failure
        if: failure()
        run: |
          MSG="⚠️ **TBH price update ล้มเหลว**\\nอาจเพราะ cookie หมดอายุ / Steam rate limit / build error\\n🔗 ดู log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n👉 ถ้า cookie หมด อัปเดต Secret \`STEAM_COOKIE\` ที่นี่:\\n${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions\\n🍪 เอา steamLoginSecure ใหม่: เปิด steamcommunity.com (login อยู่) → F12 → Application → Cookies → steamLoginSecure"
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
