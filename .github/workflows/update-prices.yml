name: Update Steam Prices

on:
  schedule:
    - cron: '37 * * * *'     # ทุก 1 ชั่วโมง (นาทีที่ 37 — เลี่ยงคิวต้นชั่วโมง)
  workflow_dispatch:          # กดรันเองได้จากแท็บ Actions

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Fetch Steam Market prices
        env:
          STEAM_COOKIE: ${{ secrets.STEAM_COOKIE }}
        run: |
          cd tbh_march
          python fetch_prices.py

      - name: Rebuild index.html
        run: |
          cd tbh_march
          python gen_tbh.py
          cp index.html ../index.html

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html tbh_march/tbh_prices.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "Update Steam Market prices (auto)"
            git push
          fi

      - name: Notify Discord on failure
        if: failure()
        run: |
          MSG="⚠️ **TBH price update ล้มเหลว**\\nอาจเพราะ cookie หมดอายุ / Steam rate limit / build error\\n🔗 ดู log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n👉 ถ้า cookie หมด: อัปเดต Secret \`STEAM_COOKIE\`"
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
