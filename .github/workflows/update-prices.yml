name: Update Steam Prices

on:
  # schedule ใช้ cron-job.org ยิง workflow_dispatch แทน (ตรงเวลากว่า GitHub cron)
  # เพิ่ม GitHub schedule กลับได้: ใส่ schedule: - cron: '37 * * * *'
  workflow_dispatch:          # cron-job.org + กดรันเองจากแท็บ Actions

permissions:
  contents: write
  actions: read      # ให้ gh api อ่านผล run ก่อนหน้าได้ (เช็ค fail 2 ครั้งติด)

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests steam

      - name: Fetch Steam Market prices
        env:
          STEAM_COOKIE: ${{ secrets.STEAM_COOKIE }}   # ทางเลือก: ถ้าหมด/ไม่มี → auto re-login ด้วย user/pass
          STEAM_USER:   ${{ secrets.STEAM_USER }}
          STEAM_PASS:   ${{ secrets.STEAM_PASS }}
        run: python fetch_prices.py

      # ถ้ารอบนี้ relogin (steam_login เขียน steam_cookie.txt) → เก็บ cookie สดกลับ Secret
      # รอบถัดๆ ไปจะ reuse cookie นี้จนหมดอายุ (~login วันละครั้ง แทนทุกรัน)
      - name: Save refreshed cookie back to secret
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}     # PAT สิทธิ์ Secrets:write (GITHUB_TOKEN เขียน secret ไม่ได้)
        run: |
          if [ -n "$GH_TOKEN" ] && [ -s steam_cookie.txt ]; then
            gh secret set STEAM_COOKIE < steam_cookie.txt
            echo "✅ cookie สดเขียนกลับ Secret STEAM_COOKIE แล้ว"
          else
            echo "ไม่มี cookie ใหม่/ไม่มี GH_PAT — ข้าม (รอบหน้าจะ login ใหม่)"
          fi

      - name: Rebuild index.html + prices.json
        run: python gen_tbh.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html prices.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "Update Steam Market prices (auto)"
            # rebase บน remote ก่อน push (กัน "fetch first" ตอน remote ขยับ)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push retry $i..."; sleep 4
            done
          fi

      - name: Notify Discord on 4 consecutive failures
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ส่ง Discord เฉพาะเมื่อ fail 4 ครั้งติด — รอบเดียว/สองพังชั่วคราว (rate limit) ไม่ต้องเตือน
          # current run ยังไม่ completed → 3 run ที่ completed ล่าสุด = 3 รอบก่อนหน้า
          # ถ้า 3 รอบนั้น fail หมด + รอบนี้ fail = 4 ครั้งติด
          FAILS=$(gh api "/repos/${{ github.repository }}/actions/workflows/update-prices.yml/runs?status=completed&per_page=3" --jq '[.workflow_runs[].conclusion] | map(select(. == "failure")) | length' 2>/dev/null || echo "0")
          echo "previous 3 completed runs failed: $FAILS/3"
          if [ "$FAILS" -lt 3 ]; then
            echo "ยังไม่ครบ 4 ครั้งติด — เงียบไว้ก่อน"
            exit 0
          fi
          MSG="⚠️ **TBH price update ล้มเหลว 4 ครั้งติด**\\nมี auto re-login แล้ว → ถ้ายังพังมักเป็น: รหัส STEAM_USER/STEAM_PASS ผิด / บัญชีติด Steam Guard (mobile+email ต้องปิดหมด) / บัญชีโดนล็อก / Steam rate limit / build error\\n🔗 ดู log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n👉 เช็ค/แก้ Secrets ที่นี่:\\n${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions"
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
